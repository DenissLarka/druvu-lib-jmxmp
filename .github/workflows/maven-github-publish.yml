# Builds the reactor and publishes druvu-lib-jmxmp-{common,client,server} to
# GitHub Packages when a GitHub release is created. Uses the automatic
# GITHUB_TOKEN (no extra secret needed). Plain `mvn deploy` (no -Prelease) so
# the central-publishing plugin stays inactive and artifacts go to the
# distributionManagement (github) repository. it/validation are deploy-skipped.

name: Publish to GitHub Packages

on:
  release:
    types: [created]
  workflow_dispatch:        # allow manual run against a tag (e.g. v2.0.0)

jobs:
  release:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github # matches distributionManagement/repository/id in pom.xml
        settings-path: ${{ github.workspace }} # location for the settings.xml file

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Publish to GitHub Packages
      run: mvn -B deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
