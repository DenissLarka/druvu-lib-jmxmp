# Builds and verifies the project on every push to main and on every pull request.
# This is the gate that catches breakage (e.g. Renovate dependency bumps) before
# it lands on main — the publish workflows only run on release, so without this a
# red build stays invisible until release time.
#
# JDK 21 Temurin (not 25): the build pins java.version=21 and enforces it via
# maven-enforcer requireJavaVersion, matching the publish workflows. `verify` also
# exercises the integration-test (-it) module.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and verify
        run: mvn -B verify
