# Builds the reactor and publishes druvu-lib-jmxmp-{common,client,server} to
# Maven Central when a GitHub release is created. The it/validation modules are
# excluded via maven.deploy.skip in their poms.
#
# Requires GitHub Secrets on THIS repo: OSSRH_USERNAME, OSSRH_TOKEN (Central
# Portal user token), GPG_PRIVATE_KEY (ASCII-armored secret key), GPG_PASSPHRASE.

name: Publish to Maven Central

on:
  release:
    types: [created]

jobs:
  publish:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'zulu'
        server-id: central
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD

    - name: Import GPG key
      run: |
        echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        gpg --list-secret-keys --keyid-format LONG
        # Configure GPG for non-interactive use
        echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
        echo "use-agent" >> ~/.gnupg/gpg.conf
        echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
        gpgconf --kill gpg-agent

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Publish to Maven Central
      run: mvn -B deploy -Prelease -Dgpg.passphrase="${GPG_PASSPHRASE}"
      env:
        MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
